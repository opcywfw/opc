<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>最新AI全套资料</title>

  <!-- 0秒自动跳转 -->
  <meta http-equiv="refresh" content="0; url=#">

  <style>
    /* 保持极简，不引入任何外部资源 */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a; /* 深蓝黑背景 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e2e8f0;
    }

    .box {
      text-align: center;
      padding: 24px 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .text {
      font-size: 16px;
      letter-spacing: 1px;
    }

    .dot::after {
      content: '';
      display: inline-block;
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="text">正在加载，请稍等<span class="dot"></span></div>
  </div>
</body>
</html>
