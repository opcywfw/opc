<title>OPC成长之路</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  color-scheme:dark;
  --bg:#07111f;
  --panel:rgba(255,255,255,0.075);
  --panel-strong:rgba(255,255,255,0.11);
  --line:rgba(148,163,184,0.22);
  --line-active:rgba(45,212,191,0.55);
  --text:#eef6ff;
  --muted:#9eb0c4;
  --accent:#2dd4bf;
  --accent-2:#60a5fa;
  --shadow:0 22px 70px rgba(0,0,0,0.38);
}

html{
  min-height:100%;
  background:var(--bg);
}

body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:42px 16px;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 18% 12%, rgba(45,212,191,0.18), transparent 28rem),
    radial-gradient(circle at 84% 18%, rgba(96,165,250,0.16), transparent 30rem),
    linear-gradient(145deg, #07111f 0%, #0b1220 48%, #050814 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

.container{
  width:min(100%,560px);
  text-align:center;
  position:relative;
}

.container::before{
  content:"";
  position:absolute;
  inset:-24px;
  z-index:-1;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

h1{
  margin-bottom:30px;
  color:#f8fbff;
  font-size:clamp(26px,5vw,38px);
  font-weight:800;
  line-height:1.18;
  letter-spacing:0;
}

.card{
  display:block;
  margin:16px 0;
  padding:22px;
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.055)),
    var(--panel);
  box-shadow:0 12px 34px rgba(0,0,0,0.2);
  transition:border-color .18s ease, background-color .18s ease, box-shadow .18s ease, transform .18s ease;
}

.card:hover{
  transform:translateY(-3px);
  border-color:var(--line-active);
  background-color:var(--panel-strong);
  box-shadow:0 18px 44px rgba(0,0,0,0.28);
}

.title{
  margin-bottom:10px;
  color:#ffffff;
  font-size:clamp(17px,3.4vw,20px);
  font-weight:700;
  line-height:1.45;
}

.desc{
  color:var(--muted);
  font-size:14px;
  line-height:1.75;
}

.tag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:26px;
  margin-bottom:12px;
  padding:3px 12px;
  border:1px solid rgba(45,212,191,0.42);
  border-radius:999px;
  background:rgba(45,212,191,0.11);
  color:#67e8f9;
  font-size:12px;
  font-weight:700;
  letter-spacing:.04em;
}

a{
  text-decoration:none;
  color:inherit;
}

.qr-box{
  margin-top:30px;
  text-align:center;
}

.qr-box img{
  width:144px;
  height:144px;
  object-fit:cover;
  border:8px solid rgba(255,255,255,0.9);
  border-radius:18px;
  background:#fff;
  box-shadow:0 16px 42px rgba(0,0,0,0.36);
  content-visibility:auto;
}

.qr-text{
  max-width:320px;
  margin:12px auto 0;
  color:var(--muted);
  font-size:12px;
  line-height:1.6;
}

@media (max-width:480px){
  body{
    align-items:start;
    padding:30px 14px;
  }

  .container::before{
    inset:-14px;
    border-radius:22px;
  }

  .card{
    padding:18px;
    border-radius:16px;
  }
}

@media (prefers-reduced-motion:reduce){
  .card{
    transition:none;
  }

  .card:hover{
    transform:none;
  }
}
</style>
</head>

</html>
